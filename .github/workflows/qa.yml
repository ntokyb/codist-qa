name: QA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: qa-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start test infra
        run: docker compose -f testcontainers/docker-compose.yml up -d --wait

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright
        run: npx playwright test
        env:
          # Maemo Compliance — maemo-compliance.co.za
          MAEMO_URL: ${{ secrets.MAEMO_COMPLIANCE_URL }}
          MAEMO_API_URL: ${{ secrets.MAEMO_COMPLIANCE_API_URL }}
        # Set repo Actions secrets for Maemo above; other products use defaults in playwright.config.ts
        # unless you add more env entries. Avoid empty secrets — they override config defaults.

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results
          path: results.xml

      - name: Stop test infra
        if: always()
        run: docker compose -f testcontainers/docker-compose.yml down -v
