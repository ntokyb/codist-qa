# Shared local / CI test infrastructure. Start with:
#   docker compose -f testcontainers/docker-compose.yml up -d --wait
#
# Use COMPOSE_PROFILES to enable optional services, e.g.:
#   COMPOSE_PROFILES=objectstore docker compose -f testcontainers/docker-compose.yml up -d --wait

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qa
      POSTGRES_PASSWORD: qa
      POSTGRES_DB: qa
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qa -d qa']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - '1025:1025'
      - '8025:8025'

  minio:
    profiles: [objectstore]
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qa
      MINIO_ROOT_PASSWORD: qaqaqaqa
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
